<html>
<head>
  <title> form </title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="container">
  <h2 style="text-align:center;">Login form</h2>
  <form class="form-horizontal" action="/action_page.php" style="text-align:center;">
    <div class="form-group" >
      <label class="control-label col-sm-4" for="uname">User name:</label>
      <div class="col-sm-8">
        <input type="uname" class="form-control" id="name" placeholder="Enter uname " name="uname">
      </div>
    </div>
    <div class="form-group">
      <label class="control-label col-sm-4" for="email">email:</label>
      <div class="col-sm-8">          
        <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
      </div>
    </div>
    <div class="form-group">
      <label class="control-label col-sm-4" for="phone">phone:</label>
      <div class="col-sm-8">          
        <input type="phone" class="form-control" id="phone" placeholder="Enter phone" name="phone">
      </div>
    </div>
  </form>
</div>
</body>
</html>
